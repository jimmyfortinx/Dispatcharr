name: Dev Pipeline

on:
  push:
    branches: [dev]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [dev]
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build and test"
        required: false
        default: ""
        type: string
      publish:
        description: "Publish GHCR images"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-pipeline-${{ inputs.ref != '' && inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      ref_name: ${{ steps.meta.outputs.ref_name }}
      repo_owner: ${{ steps.meta.outputs.repo_owner }}
      repo_name: ${{ steps.meta.outputs.repo_name }}
      branch_tag: ${{ steps.meta.outputs.branch_tag }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
      base_image: ${{ steps.meta.outputs.base_image }}
      version: ${{ steps.version.outputs.version }}
      timestamp: ${{ steps.timestamp.outputs.timestamp }}
      sha_short: ${{ steps.sha.outputs.sha_short }}
      commit_sha: ${{ steps.sha.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Resolve pipeline metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_PUBLISH: ${{ inputs.publish }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
          GITHUB_HEAD_REF_VALUE: ${{ github.head_ref }}
          GITHUB_REPOSITORY_OWNER_VALUE: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          set -euo pipefail

          CHECKOUT_REF="${INPUT_REF:-}"
          if [ -z "$CHECKOUT_REF" ]; then
            CHECKOUT_REF="$GITHUB_REF_VALUE"
          fi

          REF_NAME="${GITHUB_REF_NAME_VALUE}"
          if [ -n "${INPUT_REF:-}" ] && [[ "$INPUT_REF" == refs/heads/* ]]; then
            REF_NAME="${INPUT_REF#refs/heads/}"
          elif [ "$EVENT_NAME" = "pull_request" ] && [ -n "${GITHUB_HEAD_REF_VALUE:-}" ]; then
            REF_NAME="$GITHUB_HEAD_REF_VALUE"
          fi

          SAFE_REF=$(echo "$REF_NAME" | tr '/_' '--' | tr -cd '[:alnum:]-')
          if [ -z "$SAFE_REF" ]; then
            SAFE_REF="dev"
          fi

          if [ "$REF_NAME" = "dev" ]; then
            BRANCH_TAG="dev"
          else
            BRANCH_TAG="$SAFE_REF"
          fi

          SHOULD_PUBLISH="false"
          if [ "$EVENT_NAME" != "pull_request" ] && [ "$REF_NAME" = "dev" ] && [ "${INPUT_PUBLISH:-true}" = "true" ]; then
            SHOULD_PUBLISH="true"
          fi

          REPO_OWNER=$(echo "$GITHUB_REPOSITORY_OWNER_VALUE" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "$GITHUB_REPOSITORY_VALUE" | cut -d '/' -f 2 | tr '[:upper:]' '[:lower:]')
          BASE_IMAGE="ghcr.io/dispatcharr/dispatcharr:base"

          echo "checkout_ref=${CHECKOUT_REF}" >> "$GITHUB_OUTPUT"
          echo "ref_name=${REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"
          echo "repo_name=${REPO_NAME}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: echo "version=$(python3 -c 'import version; print(version.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Capture short SHA
        id: sha
        run: |
          echo "sha_short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  backend-tests:
    needs: [prepare]
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: dispatcharr
          POSTGRES_USER: dispatch
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dispatch -d dispatcharr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: test-secret-key
      POSTGRES_DB: dispatcharr
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_DB: 0
      DISPATCHARR_DEBUG: "False"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libvlc5 vlc-plugin-base

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --frozen --python 3.13 --no-dev

      - name: Run backend tests
        run: uv run python manage.py test

  frontend-tests:
    needs: [prepare]
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  publish-app:
    needs: [prepare, backend-tests, frontend-tests]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=dispatcharr-app
          cache-to: type=gha,mode=max,scope=dispatcharr-app
          build-args: |
            BASE_IMAGE=${{ needs.prepare.outputs.base_image }}
            BRANCH=${{ needs.prepare.outputs.ref_name }}
            REPO_URL=https://github.com/${{ github.repository }}
            TIMESTAMP=${{ needs.prepare.outputs.timestamp }}
          tags: |
            ghcr.io/${{ needs.prepare.outputs.repo_owner }}/${{ needs.prepare.outputs.repo_name }}:${{ needs.prepare.outputs.branch_tag }}
            ghcr.io/${{ needs.prepare.outputs.repo_owner }}/${{ needs.prepare.outputs.repo_name }}:${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.timestamp }}
            ghcr.io/${{ needs.prepare.outputs.repo_owner }}/${{ needs.prepare.outputs.repo_name }}:sha-${{ needs.prepare.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=${{ needs.prepare.outputs.repo_name }}
            org.opencontainers.image.description=Dispatcharr fork development image.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit_sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.timestamp }}
